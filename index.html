        // PCMをWAVに変換する関数
        const pcmToWav = (pcmData, sampleRate) => {
            const numChannels = 1;
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);

            const wavBuffer = new ArrayBuffer(44 + pcmData.length);
            const view = new DataView(wavBuffer);

            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + pcmData.length, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(view, 36, 'data');
            view.setUint32(40, pcmData.length, true);

            const pcmView = new Uint8Array(pcmData);
            for (let i = 0; i < pcmView.length; i++) {
                view.setUint8(44 + i, pcmView[i]);
            }

            return wavBuffer;
        };

                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;

                fullSentence: "Bill is the taller of the two.",
                translation: "ビルは2人のうちの背の高いほうです。",
                explanation: "「2人のうちの背の高いほう」は 〈the＋比較級＋of the two〉 を用いて，the taller of the twoで表せる。"
            },
            {
                id: "4-4", type: "translation",
                japaneseText: "ケンはテニスをするよりも水泳をするのが好きだ。",
                questionParts: ["", ""],
                correctAnswer: ["Ken prefers swimming to playing tennis.", "Ken likes swimming better than playing tennis."],
                fullSentence: "Ken prefers swimming to playing tennis.",
                translation: "ケンはテニスをするよりも水泳をするのが好きだ。",
                explanation: "「…より～のほうが好きだ」は ，prefer ～ to ... または like ～ better than ... を用いて表せる。"
            }
        ];

        // ==========================================
        // Main Quiz Card Component
        // ==========================================
        const QuizCard = ({ question, index, sectionTitle }) => {
            const isMultipleChoice = question.type === "multiple-choice";
            const isOrdering = question.type === "ordering";
            const isTranslation = question.type === "translation";
            
            // Interaction states
            const [selectedOption, setSelectedOption] = useState(null);
            const [inputValue, setInputValue] = useState("");
            const [isCorrect, setIsCorrect] = useState(null);
            const [showExplanation, setShowExplanation] = useState(false);
            const [history, setHistory] = useState([]); 
            
            // Audio/Recording states
            const [isRecording, setIsRecording] = useState(false);
            const [audioUrl, setAudioUrl] = useState(null);
            const [isPlayingTTS, setIsPlayingTTS] = useState(false);
            const mediaRecorderRef = useRef(null);
            const audioChunksRef = useRef([]);

            // =========================
            // Action Handlers
            // =========================
            const handleOptionClick = (option) => {
                if (selectedOption) return;
                setSelectedOption(option);
                const isAnsCorrect = option === question.correctAnswer;
                setIsCorrect(isAnsCorrect);
                setShowExplanation(true);
                setHistory(prev => [...prev, { answer: option, isCorrect: isAnsCorrect }]);
            };

            const handleCheckTextInput = () => {
                if (!inputValue.trim()) return;
                
                const correctAnswers = Array.isArray(question.correctAnswer) ? question.correctAnswer : [question.correctAnswer];
                
                // 記号や余分なスペースを無視して比較するための関数
                const normalize = (text) => text.trim().toLowerCase().replace(/[.,!?]/g, '').replace(/\s+/g, ' ');
                const normalizedInput = normalize(inputValue);
                
                const isMatch = correctAnswers.some(ans => normalize(ans) === normalizedInput);
                
                setIsCorrect(isMatch);
                setShowExplanation(true);
                setHistory(prev => [...prev, { answer: inputValue.trim(), isCorrect: isMatch }]);
            };

            const handleReset = () => {
                setSelectedOption(null);
                setInputValue("");
                setIsCorrect(null);
                setShowExplanation(false);
                setIsPlayingTTS(false);
                if (window.speechSynthesis) window.speechSynthesis.cancel();
            };

            const getDisplayCorrectAnswer = () => {
                return Array.isArray(question.correctAnswer) ? question.correctAnswer[0] : question.correctAnswer;
            };

            // =========================
            // TTS Handler
            // =========================
            const playAuthenticTTS = async (text) => {
                if (isPlayingTTS) return;
                setIsPlayingTTS(true);

                try {
                    if (apiKey) {
                        const payload = {
                            contents: [{ parts: [{ text: text }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: {
                                    voiceConfig: {
                                        prebuiltVoiceConfig: { voiceName: "Aoede" } 
                                    }
                                }
                            },
                            model: "gemini-2.5-flash-preview-tts"
                        };

                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (response.ok) {
                            const data = await response.json();
                            if (data.candidates?.[0]?.content?.parts?.[0]?.inlineData) {
                                const inlineData = data.candidates[0].content.parts[0].inlineData;
                                const sampleRateMatch = inlineData.mimeType.match(/rate=(\d+)/);
                                const sampleRate = sampleRateMatch ? parseInt(sampleRateMatch[1]) : 24000;
                                
                                const pcmData = base64ToArrayBuffer(inlineData.data);
                                const wavData = pcmToWav(pcmData, sampleRate);
                                const blob = new Blob([wavData], { type: 'audio/wav' });
                                const url = URL.createObjectURL(blob);
                                const audio = new Audio(url);
                                
                                audio.onended = () => setIsPlayingTTS(false);
                                audio.onerror = () => setIsPlayingTTS(false);
                                await audio.play();
                                return;
                            }
                        }
                    }
                } catch (e) {
                    console.log("Falling back to Web Speech API", e);
                }

                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    
                    const voices = window.speechSynthesis.getVoices();
                    const enVoices = voices.filter(v => v.lang.startsWith('en-'));
                    const preferredVoice = enVoices.find(v => 
                        v.name.includes('Google') || v.name.includes('Premium') || v.name.includes('Natural')
                    ) || enVoices[0];
                    
                    if (preferredVoice) {
                        utterance.voice = preferredVoice;
                    }

                    utterance.onend = () => setIsPlayingTTS(false);
                    utterance.onerror = () => setIsPlayingTTS(false);
                    window.speechSynthesis.speak(utterance);
                } else {
                    setIsPlayingTTS(false);
                    alert("お使いのブラウザは音声読み上げに対応していません。");
                }
            };

            useEffect(() => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.getVoices(); 
                }
            }, []);

            // =========================
            // Recording Handlers
            // =========================
            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const mediaRecorder = new MediaRecorder(stream);
                    mediaRecorderRef.current = mediaRecorder;
                    audioChunksRef.current = [];

                    mediaRecorder.ondataavailable = (event) => {
                        audioChunksRef.current.push(event.data);
                    };

                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/wav' });
                        const url = URL.createObjectURL(audioBlob);
                        setAudioUrl(url);
                    };

                    mediaRecorder.start();
                    setIsRecording(true);
                } catch (err) {
                    console.error("Error accessing microphone:", err);
                    alert("マイクへのアクセスが許可されていません。設定を確認してください。");
                }
            };

            const stopRecording = () => {
                if (mediaRecorderRef.current && isRecording) {
                    mediaRecorderRef.current.stop();
                    setIsRecording(false);
                    mediaRecorderRef.current.stream.getTracks().forEach(track => track.stop());
                }
            };

            return (
                <div className="w-full bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-8 p-6 md:p-8 transition-all hover:shadow-md">
                    {/* Header */}
                    <div className="flex justify-between items-start mb-6 pb-4 border-b border-slate-100">
                        <div className="flex flex-col gap-2">
                            <span className="text-lg font-bold text-slate-400 uppercase tracking-wider">
                                {sectionTitle} - Q{index + 1}
                            </span>
                            {history.length > 0 && (
                                <div className="flex flex-wrap gap-2 items-center mt-1">
                                    <span className="text-xs text-slate-400 font-bold">履歴:</span>
                                    {history.map((h, i) => (
                                        <div key={i} className={`flex items-center gap-1 px-2 py-1 rounded-md text-xs font-bold ${h.isCorrect ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-red-50 text-red-700 border border-red-200'}`} title={`${i + 1}回目の回答: ${h.answer}`}>
                                            {h.isCorrect ? <CheckCircle size={12} /> : <XCircle size={12} />}
                                            <span className="truncate max-w-[100px]">{h.answer}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                        {isCorrect !== null && (
                            <div className={`flex items-center gap-2 px-3 py-1 rounded-full text-sm font-bold fade-in shrink-0 ${isCorrect ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                {isCorrect ? (
                                    <React.Fragment><CheckCircle size={18} /> Correct</React.Fragment>
                                ) : (
                                    <React.Fragment><XCircle size={18} /> Incorrect</React.Fragment>
                                )}
                            </div>
                        )}
                    </div>

                    {/* Question Content */}
                    <div className="mb-8">
                        {!isMultipleChoice && question.japaneseText && (
                            <div className="mb-6">
                                <p className="text-slate-600 font-medium text-lg border-l-4 border-blue-400 pl-3">
                                    {question.japaneseText.split('\n').map((line, i) => (
                                        <React.Fragment key={i}>
                                            {line}
                                            {i !== question.japaneseText.split('\n').length - 1 && <br />}
                                        </React.Fragment>
                                    ))}
                                </p>
                                {question.hint && (
                                    <p className="text-slate-500 font-medium mt-3 text-sm md:text-base pl-3">
                                        並べ替え: <span className="font-bold">{question.hint}</span>
                                    </p>
                                )}
                            </div>
                        )}
                        
                        <div className={`text-2xl md:text-3xl font-medium leading-relaxed text-slate-800 ${isTranslation ? 'flex flex-col' : ''}`}>
                            {question.questionParts[0] && <span>{question.questionParts[0]} </span>}
                            
                            {isMultipleChoice ? (
                                <span className={`inline-block border-b-4 min-w-[6rem] text-center px-2 font-bold transition-colors ${showExplanation ? 'border-slate-800 text-blue-600' : 'border-slate-300 text-slate-300'}`}>
                                    {showExplanation ? getDisplayCorrectAnswer() : `( ${index + 1} )`}
                                </span>
                            ) : (
                                <input 
                                    type="text" 
                                    value={inputValue}
                                    onChange={(e) => setInputValue(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && handleCheckTextInput()}
                                    className={`border-b-4 bg-transparent text-center font-bold focus:outline-none px-2 transition-colors ${
                                        isTranslation || isOrdering ? 'w-full max-w-full text-xl md:text-2xl mt-2' : 'w-32 md:w-64'
                                    } ${
                                        showExplanation 
                                            ? (isCorrect ? 'text-green-600 border-green-600' : 'text-red-500 border-red-500 line-through decoration-2') 
                                            : 'border-slate-400 text-blue-600 focus:border-blue-600'
                                    }`}
                                    placeholder={isTranslation ? "英文を入力..." : "入力..."}
                                    disabled={showExplanation}
                                    autoComplete="off"
                                />
                            )}
                            
                            {question.questionParts[1] && <span> {question.questionParts[1]}</span>}
                        </div>
                    </div>

                    {/* Interaction Area */}
                    {isMultipleChoice && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            {question.options.map((option, optIndex) => {
                                let btnClass = "text-left p-4 md:p-5 rounded-xl border-2 transition-all duration-200 text-xl md:text-2xl font-medium ";
                                if (!showExplanation) {
                                    btnClass += "border-slate-200 hover:border-blue-400 hover:bg-blue-50 text-slate-700";
                                } else {
                                    if (option === question.correctAnswer) {
                                        btnClass += "bg-green-100 border-green-500 text-green-800 font-bold shadow-sm";
                                    } else if (option === selectedOption) {
                                        btnClass += "bg-red-50 border-red-400 text-red-700 line-through decoration-2";
                                    } else {
                                        btnClass += "border-slate-100 text-slate-400 opacity-50";
                                    }
                                }
                                return (
                                    <button
                                        key={optIndex}
                                        onClick={() => handleOptionClick(option)}
                                        disabled={showExplanation}
                                        className={btnClass}
                                    >
                                        <div className="flex items-center gap-3">
                                            <span className="font-bold text-base md:text-lg text-slate-400 mt-0.5">
                                                {['a', 'b', 'c', 'd'][optIndex]}.
                                            </span>
                                            {option}
                                        </div>
                                    </button>
                                );
                            })}
                        </div>
                    )}

                    {!showExplanation && !isMultipleChoice && (
                        <div className="flex justify-end mb-4 mt-6">
                            <button 
                                onClick={handleCheckTextInput} 
                                disabled={!inputValue.trim()}
                                className="bg-blue-600 disabled:bg-slate-300 text-white px-8 py-3 rounded-xl font-bold text-lg hover:bg-blue-700 transition-colors shadow-sm"
                            >
                                回答する
                            </button>
                        </div>
                    )}

                    {/* Explanation & Audio Section */}
                    {showExplanation && (
                        <div className="fade-in">
                            <div className={`p-6 rounded-xl mt-6 ${isCorrect ? 'bg-green-50 border border-green-100' : 'bg-red-50 border border-red-100'}`}>
                                
                                {!isCorrect && (
                                    <div className="mb-5 p-3 bg-white/80 rounded-lg border border-red-200 shadow-sm">
                                        <div className="flex flex-col md:flex-row md:items-center gap-2 text-lg">
                                            <span className="font-bold text-slate-700 text-sm md:text-base">あなたの解答:</span>
                                            <span className="text-red-600 font-bold line-through mr-2">
                                                {isMultipleChoice ? selectedOption : inputValue}
                                            </span>
                                            <span className="font-bold text-slate-700 text-sm md:text-base hidden md:inline">→</span>
                                            <span className="font-bold text-blue-600">正解: {getDisplayCorrectAnswer()}</span>
                                        </div>
                                    </div>
                                )}

                                <div className="mb-6">
                                    <p className="text-xl md:text-2xl font-bold text-slate-800 mb-3 leading-relaxed">
                                        {question.fullSentence}
                                    </p>
                                    <p className="text-lg text-slate-600 mb-5 pb-5 border-b border-slate-200/60">
                                        {question.translation}
                                    </p>
                                    <div className="bg-white/70 p-5 rounded-lg text-base md:text-lg text-slate-700 leading-relaxed shadow-sm">
                                        <span className="font-bold mr-2 text-slate-900 bg-slate-200 px-2 py-1 rounded text-sm">解説</span>
                                        {question.explanation}
                                    </div>
                                </div>

                                <div className="flex flex-col gap-4 mt-6 pt-4 border-t border-slate-100">
                                    <div className="flex flex-wrap justify-between items-center gap-4">
                                        <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Speaking Practice</span>
                                        
                                        <button 
                                            onClick={handleReset}
                                            className="flex items-center gap-1.5 text-slate-500 hover:text-blue-600 bg-slate-100 hover:bg-blue-50 px-3 py-1.5 rounded-lg text-sm font-bold transition-colors"
                                        >
                                            <RotateCcw size={16} />
                                            もう一度解く
                                        </button>
                                    </div>
                                    
                                    <div className="flex flex-wrap gap-3">
                                        <button 
                                            onClick={() => playAuthenticTTS(question.fullSentence)}
                                            disabled={isPlayingTTS}
                                            className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white px-5 py-3 rounded-xl font-medium text-base transition-colors shadow-sm"
                                        >
                                            {isPlayingTTS ? <Loader size={20} /> : <Volume2 size={20} />}
                                            お手本
                                        </button>

                                        {!isRecording ? (
                                            <button 
                                                onClick={startRecording}
                                                className="flex items-center gap-2 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-5 py-3 rounded-xl font-medium text-base transition-colors shadow-sm"
                                            >
                                                <Mic size={20} className="text-red-500" />
                                                録音
                                            </button>
                                        ) : (
                                            <button 
                                                onClick={stopRecording}
                                                className="flex items-center gap-2 bg-red-50 border border-red-200 hover:bg-red-100 text-red-600 px-5 py-3 rounded-xl font-medium text-base transition-colors animate-pulse"
                                            >
                                                <Square size={20} fill="currentColor" />
                                                停止
                                            </button>
                                        )}

                                        {audioUrl && !isRecording && (
                                            <button 
                                                onClick={() => {
                                                    const audio = new Audio(audioUrl);
                                                    audio.play();
                                                }}
                                                className="flex items-center gap-2 bg-emerald-50 border border-emerald-200 hover:bg-emerald-100 text-emerald-700 px-5 py-3 rounded-xl font-medium text-base transition-colors fade-in"
                                            >
                                                <Play size={20} fill="currentColor" />
                                                再生
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                            
                            <div className="mt-6 pt-4 border-t border-slate-200/50 flex justify-end">
                                <button 
                                    onClick={handleReset}
                                    className="flex items-center gap-2 bg-white border border-slate-300 hover:bg-slate-100 text-slate-600 px-6 py-2 rounded-xl font-bold transition-colors shadow-sm"
                                >
                                    <RotateCcw size={18} />
                                    もう一度解く
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // Main App Component
        // ==========================================
        const App = () => {
            return (
                <div className="min-h-screen text-slate-800 pb-16">
                    {/* Top Navigation / Header */}
                    <div className="bg-slate-800 text-white py-12 px-4 shadow-md mb-10">
                        <div className="max-w-4xl mx-auto text-center">
                            <div className="inline-flex items-center justify-center p-3 bg-blue-500/20 rounded-full mb-4">
                                <BookOpen className="text-blue-400 w-8 h-8" />
                            </div>
                            <h1 className="text-3xl md:text-5xl font-bold mb-4 tracking-tight">
                                Speed Grammar 5 <span className="text-blue-400">Unit 5</span>
                            </h1>
                            <p className="text-slate-300 text-lg md:text-xl font-light">比較 - 音声練習付きアプリ</p>
                        </div>
                    </div>

                    <div className="max-w-3xl mx-auto px-4">
                        {/* Section 1 */}
                        <div className="mb-12">
                            <div className="mb-6 flex items-baseline gap-4">
                                <h2 className="text-2xl font-bold text-slate-800 border-b-4 border-blue-500 pb-1">大問 1</h2>
                                <p className="text-slate-500 text-sm font-medium">（ ）に入る適切な語句を選びなさい。</p>
                            </div>
                            {quizDataPart1.map((question, index) => (
                                <QuizCard key={question.id} question={question} index={index} sectionTitle="Part 1" />
                            ))}
                        </div>

                        {/* Section 2 */}
                        <div className="mb-12">
                            <div className="mb-6 flex items-baseline gap-4 mt-16">
                                <h2 className="text-2xl font-bold text-slate-800 border-b-4 border-emerald-500 pb-1">大問 2</h2>
                                <p className="text-slate-500 text-sm font-medium">日本語の意味を表すように、空所に適切な語を書きなさい。</p>
                            </div>
                            {quizDataPart2.map((question, index) => (
                                <QuizCard key={question.id} question={question} index={index} sectionTitle="Part 2" />
                            ))}
                        </div>
                        
                        {/* Section 3 */}
                        <div className="mb-12">
                            <div className="mb-6 flex items-baseline gap-4 mt-16">
                                <h2 className="text-2xl font-bold text-slate-800 border-b-4 border-purple-500 pb-1">大問 3</h2>
                                <p className="text-slate-500 text-sm font-medium">意味が通るように（ ）の中の語句を並べかえなさい。</p>
                            </div>
                            {quizDataPart3.map((question, index) => (
                                <QuizCard key={question.id} question={question} index={index} sectionTitle="Part 3" />
                            ))}
                        </div>
                        
                        {/* Section 4 */}
                        <div className="mb-12">
                            <div className="mb-6 flex items-baseline gap-4 mt-16">
                                <h2 className="text-2xl font-bold text-slate-800 border-b-4 border-orange-500 pb-1">大問 4</h2>
                                <p className="text-slate-500 text-sm font-medium">次の日本語を英語に直しなさい。</p>
                            </div>
                            {quizDataPart4.map((question, index) => (
                                <QuizCard key={question.id} question={question} index={index} sectionTitle="Part 4" />
                            ))}
                        </div>
                    </div>
                    
                    <footer className="text-center text-slate-400 mt-16 pb-8 text-sm">
                        <p>© Speed Grammar 5 Interactive App</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
